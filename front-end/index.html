<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARKUS</title>
    <style>
        :root { --bg: #1a1d23; --card: #252a33; --accent: #3498db; --danger: #e74c3c; --text: #ecf0f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { display: grid; grid-template-columns: 350px 1fr; gap: 20px; max-width: 1400px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 8px; border-left: 4px solid var(--accent); }
        h2 { margin-top: 0; font-size: 1.2rem; color: var(--accent); text-transform: uppercase; }
        input, select, button { width: 100%; padding: 10px; margin: 8px 0; border-radius: 4px; border: none; background: #343b47; color: white; box-sizing: border-box; }
        button { background: var(--accent); cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        .btn-delete { background: var(--danger); width: auto; padding: 5px 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #2c333d; text-align: left; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #343b47; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        .filter-bar input { width: 200px; }
    </style>
</head>
<body>

    <h1>ARKUS | Sistema de Roteirização Domiciliar</h1>

    <div class="container">
        <aside>
            <div class="card">
                <h2>Cadastro Manual</h2>
                <input type="text" id="nome" placeholder="Nome do Paciente">
                <input type="text" id="endereco" placeholder="Endereço">
                <select id="turno">
                    <option>Manhã</option>
                    <option>Tarde</option>
                </select>
                <select id="tipo">
                    <option>Coleta de Sangue</option>
                    <option>Retirada de Material</option>
                </select>
                <select id="preferencia_horario">
                    <option>Sem preferência</option>
                    <option value="07:00">07:00</option><option value="08:00">08:00</option>
                    <option value="09:00">09:00</option><option value="10:00">10:00</option>
                    <option value="11:00">11:00</option><option value="12:00">12:00</option>
                    <option value="13:00">13:00</option><option value="14:00">14:00</option>
                    <option value="15:00">15:00</option><option value="16:00">16:00</option>
                    <option value="17:00">17:00</option><option value="18:00">18:00</option>
                </select>
                <input type="date" id="data">
                <button onclick="cadastrar()">Adicionar Entrada</button>
            </div>
            <br>
            <div class="card">
                <h2>Importar arquivo (.csv)</h2>
                <input type="file" id="csvFile" accept=".csv">
                <button onclick="importar()" style="background:#27ae60;">Processar Lote</button>
            </div>
        </aside>

        <main class="card">
            <div class="filter-bar">
                <h2>Coletas Pendentes</h2>
                <input type="date" id="filtroData" oninput="filtrar()">
            </div>
            <table id="tabelaColetas">
                <thead>
                    <tr>
                        <th>Paciente</th>
                        <th>Endereço</th>
                        <th>Data</th>
                        <th>Turno</th>
                        <th>Preferência</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </main>
    </div>

    <script>
        const API = "http://localhost:5000";
        window.todasColetas = []; 

        async function listar() {
            const res = await fetch(`${API}/listar`);
            const dados = await res.json();
            window.todasColetas = dados;
            renderizar(dados);
        }

        function renderizar(lista) {
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = lista.map(c => `
                <tr>
                    <td>${c.nome}</td>
                    <td>${c.endereco}</td>
                    <td>${new Date(c.data_agendamento).toLocaleDateString('pt-BR', {timeZone: 'UTC'})}</td>
                    <td>${c.turno}</td>
                    <td>${c.preferencia_horario || '-'}</td>
                    <td><strong>${c.status}</strong></td>
                    <td>
                        <button class="btn-delete" onclick="deletar(${c.id}, '${c.nome}')">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        function filtrar() {
            const dataFiltro = document.getElementById('filtroData').value;
            if(!dataFiltro) return renderizar(window.todasColetas);
            const filtrados = window.todasColetas.filter(c => {
                const dataBanco = new Date(c.data_agendamento).toISOString().split('T')[0];
                return dataBanco === dataFiltro;
            });
            renderizar(filtrados);
        }

        async function cadastrar() {
            const obj = {
                nome: document.getElementById('nome').value,
                endereco: document.getElementById('endereco').value,
                turno: document.getElementById('turno').value,
                tipo: document.getElementById('tipo').value,
                preferencia_horario: document.getElementById('preferencia_horario').value,
                data: document.getElementById('data').value
            };
            await fetch(`${API}/cadastrar`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(obj)
            });
            alert("Coleta cadastrada com sucesso!");
            listar();
            limparFormulario();
        }

        function limparFormulario() {
            document.getElementById('nome').value = "";
            document.getElementById('endereco').value = "";
            document.getElementById('data').value = "";
        }

        async function importar() {
            const file = document.getElementById('csvFile').files[0];
            if(!file) return alert("Selecione um arquivo CSV.");
            const formData = new FormData();
            formData.append('file', file);
            await fetch(`${API}/importar_csv`, { method: 'POST', body: formData });
            alert("Lista importada com sucesso!");
            listar();
        }

        async function deletar(id, nome) {
            if(confirm(`Deseja realmente cancelar a coleta de ${nome}?`)) {
                await fetch(`${API}/deletar/${id}`, {method: 'DELETE'});
                listar();
            }
        }

        listar();
    </script>
</body>
</html>
