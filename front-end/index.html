<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ARKUS - Agendamentos</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --bg: #1a1d23; 
            --card: #252a33; 
            --accent: #3498db; 
            --text: #ecf0f1; 
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
        }
        nav { 
            background: var(--card); 
            padding: 15px 40px; 
            margin-bottom: 30px; 
            display: flex; 
            gap: 30px; 
            border-bottom: 2px solid #343b47; 
        }
        nav a { 
            color: var(--text); 
            text-decoration: none; 
            font-weight: bold; 
            opacity: 0.6; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        nav a.active { 
            opacity: 1; 
            color: var(--accent); 
            border-bottom: 2px solid var(--accent); 
        }
        .titulo-sistema { 
            font-size: 24px; 
            font-weight: bold; 
            color: var(--accent); 
            margin-bottom: 15px; 
        }
        
        .container { display: flex; gap: 20px; }
        
        .sidebar { 
            width: 300px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }
        
        .card-box { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 8px; 
            border-left: 4px solid var(--accent); 
        }

        .main-content { 
            flex: 1; 
            background: var(--card); 
            padding: 20px; 
            border-radius: 8px; 
        }

        input, select { 
            width: 100%; 
            padding: 10px; 
            margin-bottom: 15px; 
            background: #343b47; 
            color: white; 
            border: 1px solid #444; 
            border-radius: 4px; 
            box-sizing: border-box; 
        }
        
        button.btn-primary { 
            width: 100%; 
            padding: 10px; 
            background: var(--accent); 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
        }

        button.btn-success { 
            width: 100%; 
            padding: 10px; 
            background: #2ecc71; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
        }

        .header-list { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
        }
        .header-list h2 { margin: 0; }
        .header-list div { display: flex; gap: 10px; align-items: center; }
        .btn-config { background: transparent; border: none; font-size: 20px; cursor: pointer; padding: 0; color: #bbb;}

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #343b47; font-size: 14px; }
        th { color: #bbb; }
    </style>
</head>
<body>
    <div class="titulo-sistema">ARKUS | Sistema de Roteirização Domiciliar</div>
    
    <nav>
        <a href="index.html" class="active"><i data-lucide="calendar"></i>Agendamentos</a>
        <a href="tecnicos.html"><i data-lucide="users"></i>Gestão de Equipe</a>
        <a href="rotas.html"><i data-lucide="route"></i>Rotas</a>
    </nav>

    <div class="container">
        <div class="sidebar">
            <div class="card-box">
                <h3 style="margin-top: 0;">Nova Solicitação</h3>
                <input type="text" placeholder="Nome do Paciente" id="nome">
                <input type="text" placeholder="Endereço" id="endereco">
                <select id="turno">
                    <option value="Manhã">Manhã</option>
                    <option value="Tarde">Tarde</option>
                </select>
                <select id="tipo">
                    <option value="Coleta">Coleta</option>
                    <option value="Retirada">Retirada</option>
                </select>
                <input type="time" id="preferencia">
                <input type="date" id="data">
                <button class="btn-primary">Salvar</button>
            </div>

            <div class="card-box" style="border-left-color: #2ecc71;">
                <h3 style="margin-top: 0;">Importar CSV</h3>
                <input type="file" id="file_csv" style="margin-bottom: 15px; padding: 0; background: transparent; border: none;">
                <button class="btn-success" onclick="importarCSV()">Importar arquivo</button>
            </div>
        </div>

        <div class="main-content">
            <div class="header-list">
                <h2>Coletas Solicitadas</h2>
                <div>
                    <input type="date" id="filtro_data" onchange="listar()" style="width: 150px; margin-bottom: 0;">
                    <button class="btn-config">⚙️</button>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Paciente</th>
                        <th>Endereço</th>
                        <th>Data</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="lista">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API = "http://localhost:5000";

        window.onload = () => {
            lucide.createIcons();
            listar();
        };

        async function listar() {
            const f = document.getElementById('filtro_data').value;
            let query = f ? `?data=${f}` : "";

            try {
                const res = await fetch(`${API}/listar_coletas${query}`);
                const dados = await res.json();
                
                document.getElementById('lista').innerHTML = dados.map(c => {
                    const dataFormatada = new Date(c.data_agendamento).toLocaleDateString('pt-BR', {timeZone: 'UTC'});
                    
                    return `<tr>
                        <td><strong>${c.nome}</strong></td>
                        <td>${c.endereco}</td>
                        <td>${dataFormatada}</td>
                        <td><span style="color: #f1c40f; font-weight: bold;">${c.status}</span></td>
                    </tr>`;
                }).join('');
                
            } catch (error) {
                console.error(error);
            }
        }

        async function importarCSV() {
            const fileInput = document.getElementById('file_csv');
            if (!fileInput.files.length) return;

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            const btn = document.querySelector('.btn-success');
            const textoOriginal = btn.innerText;
            btn.innerText = "Importando...";

            try {
                const req = await fetch(`${API}/importar/coletas`, {
                    method: 'POST',
                    body: formData
                });
                
                if(req.ok) {
                    listar(); 
                }
            } catch (error) {
                console.error(error);
            } finally {
                btn.innerText = textoOriginal;
                fileInput.value = ''; 
            }
        }
    </script>
</body>
</html>
